<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moneda nacional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="box p-4">
            <h3 class="text-center mb-4">Conversor de moneda nacional</h3>
            <hr class="mb-4">
            <h5 class="mb-3">Pesos CLP</h5>
            <input id="monto" type="number" class="form-control form-control-md mb-3" placeholder="Ingrese monto en CLP">
            <p>Moneda a convertir:</p>
            <div class="input-group mb-3">
                <select id="monedas" class="form-select form-select-md">
                    <option selected disabled>Seleccione moneda</option>
                    <option value="dolar">Dólar</option>
                    <option value="euro">Euro</option>
                    <option value="uf">UF</option>
                </select>
                <button id="convertButton" class="btn btn-primary">Convertir</button>
            </div>
            <p>Resultado:</p>
            <h5 id="resultado"></h5><p id="none"></p>
        </div>
    </div>
    <script src="./assets/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
